<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="grid-container">
    <div id="sidebar">
      <div>
        <img src="./assets/view-dashboard.svg" alt="Dashboard Icon">
        <h1>Dashboard</h1>
      </div>
      
      <ul id="menu-items">
        <div>
          <img src="./assets/home.svg" alt="Home Icon">
          <li>Home</li>
        </div>

        <div>
          <img src="./assets/card-account-details-outline.svg" alt="Profile Icon">
          <li>Profile</li>
        </div>

        <div>
          <img src="./assets/message.svg" alt="Messages Icon">
          <li>Messages</li>
        </div>

        <div>
          <img src="./assets/history.svg" alt="History Icon">
          <li>History</li>
        </div>

        <div>
          <img src="./assets/note-multiple.svg" alt="Tasks Icon">
          <li>Tasks</li>
        </div>

        <div>
          <img src="./assets/account-group.svg" alt="Communities Icon">
          <li>Communities</li>
        </div>

        <div>
          <img src="./assets/cog.svg" alt="Settings Icon">
          <li>Settings</li>
        </div>

        <div>
          <img src="./assets/help-box.svg" alt="Support Icon">
          <li>Support</li>
        </div>

        <div>
          <img src="./assets/shield-check.svg" alt="Privacy Icon">
          <li>Privacy</li>
        </div>
      </ul>
    </div>
    <div id="header">
      Header
    </div>
    <div id="main-content">
      Main Content
    </div>
  </div>
  
</body>
</html>
